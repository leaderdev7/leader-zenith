<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leader Zenith | Apex</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        /* [YOUR ORIGINAL CSS - NO CHANGES MADE] */
        :root { --accent: #0078ff; }
        body { background: #0a0a0a; color: #eee; font-family: 'Consolas', monospace; margin: 0; overflow-x: hidden; }
        #canvas-particles { position: fixed; top: 0; left: 0; z-index: -1; }
        .zenith-logo { cursor: pointer; transition: 0.3s; }
        /* ... (rest of your original styling) ... */
    </style>
</head>
<body>

<canvas id="canvas-particles"></canvas>

<div id="main-ui">
    <h1 class="zenith-logo" onclick="handleZenithClick()">Leader <span style="color:var(--accent)">Zenith</span></h1>
    <div id="plugin-container"></div>
    <div id="gallery-container"></div>
</div>

<script>
    // --- FIREBASE CONFIG (The "Brain" that syncs all phones) ---
    const firebaseConfig = {
        // PASTE YOUR FIREBASE SETTINGS HERE
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- YOUR ORIGINAL LOGIC (Particles, Clicks, etc.) ---
    let clickCount = 0;
    function handleZenithClick() {
        clickCount++;
        if(clickCount === 3) {
            const pass = prompt("Enter Admin Password:");
            if(pass === "ahmadop1122") {
                // Redirect to the separate admin.html you just created
                window.location.href = "admin.html";
            }
            clickCount = 0;
        }
    }

    // --- THE FIX: SYNCING ITEMS ACROSS ALL PHONES ---
    // Instead of looking at the phone's local memory, we listen to the Cloud
    db.ref('assets').on('value', (snapshot) => {
        const data = snapshot.val();
        renderWebsiteItems(data);
    });

    function renderWebsiteItems(data) {
        const pluginBox = document.getElementById('plugin-container');
        const galleryBox = document.getElementById('gallery-container');
        
        // Clear current view
        pluginBox.innerHTML = "";
        galleryBox.innerHTML = "";

        if(!data) return;

        Object.keys(data).forEach(key => {
            const item = data[key];
            const html = `<div class="item-card">
                            <img src="${item.url}" alt="${item.name}">
                            <p>${item.name}</p>
                          </div>`;
            
            if(item.cat === 'plugin') pluginBox.innerHTML += html;
            else galleryBox.innerHTML += html;
        });
    }

    // [STARDUST PARTICLE ENGINE CODE REMAINS HERE - NO CHANGES]
</script>
</body>
</html>
